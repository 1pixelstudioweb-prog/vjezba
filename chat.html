<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Chat | Digitalni Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --dark: #030712; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--dark); color: white; font-family: 'Outfit', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .chat-container { flex: 1; display: flex; flex-direction: column; max-width: 800px; margin: 40px auto; width: 95%; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; overflow: hidden; }
        .chat-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02); }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background: rgba(0,0,0,0.2); }
        .message { margin-bottom: 15px; padding: 12px 18px; border-radius: 15px; max-width: 80%; }
        .msg-received { background: rgba(255,255,255,0.05); align-self: flex-start; }
        .msg-sent { background: var(--primary); color: black; align-self: flex-end; margin-left: auto; font-weight: 500; }
        .chat-input { padding: 20px; display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        .form-control { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; }
        .btn-send { background: var(--primary); border: none; border-radius: 12px; width: 50px; color: black; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header d-flex justify-content-between align-items-center">
            <h5 class="m-0 fw-bold">PixelStudio Podrška</h5>
            <a href="index.html" class="text-white-50 text-decoration-none small">Završi Chat</a>
        </div>
        <div class="chat-messages d-flex flex-column" id="msgBox">
            <div class="message msg-received">Zdravo! Dobrodošli u PixelStudio chat. Kako vam možemo pomoći?</div>
        </div>
        <form class="chat-input" id="chatForm">
            <input type="text" id="userInput" class="form-control" placeholder="Unesite poruku..." autocomplete="off">
            <button type="submit" class="btn-send"><i class="fa-solid fa-paper-plane"></i></button>
        </form>
    </div>

    <script>
        document.getElementById('chatForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const input = document.getElementById('userInput');
            const msgBox = document.getElementById('msgBox');
            
            if (input.value.trim() !== "") {
                // Dodaj tvoju poruku
                const myMsg = document.createElement('div');
                myMsg.className = "message msg-sent";
                myMsg.textContent = input.value;
                msgBox.appendChild(myMsg);
                
                // Automatski odgovor
                setTimeout(() => {
                    const reply = document.createElement('div');
                    reply.className = "message msg-received";
                    reply.textContent = "Vaša poruka je primljena. Naš tim će vam se javiti uskoro!";
                    msgBox.appendChild(reply);
                    msgBox.scrollTop = msgBox.scrollHeight;
                }, 1000);

                input.value = "";
                msgBox.scrollTop = msgBox.scrollHeight;
            }
        });
    </script>
</body>
</html>
