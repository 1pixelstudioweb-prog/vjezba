<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prijava | PixelStudio</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">

  <style>
    :root { --primary: #00d2ff; --dark: #030712; --glass: rgba(255, 255, 255, 0.03); }

    body {
      background: var(--dark);
      color: white;
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid var(--glass);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .login-box {
      background: var(--glass);
      backdrop-filter: blur(20px);
      padding: 40px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      width: 100%;
      max-width: 400px;
      transform: translateY(20px);
      opacity: 0;
      animation: fadeIn 0.8s forwards 0.5s;
    }

    @keyframes fadeIn { to { transform: translateY(0); opacity: 1; } }

    .form-control {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      border-radius: 15px;
      padding: 12px;
    }

    .form-control:focus {
      background: rgba(255,255,255,0.08);
      border-color: var(--primary);
      box-shadow: none;
      color: white;
    }

    .btn-pixel {
      background: var(--primary);
      color: #000;
      font-weight: 700;
      border: none;
      border-radius: 15px;
      width: 100%;
      padding: 12px;
      transition: 0.3s;
    }

    .btn-pixel:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }
  </style>
</head>

<body>

  <div class="login-box" id="loginBox">
    <h2 class="fw-bold mb-4 text-center">Dobrodošli <span style="color:var(--primary)">Nazad</span></h2>

    <form id="loginForm">
      <div class="mb-3">
        <label class="small mb-2 opacity-50">Korisničko ime ili Email</label>
        <input type="text" class="form-control" id="email" placeholder="admin@pixelstudio.com" required>
      </div>

      <div class="mb-4">
        <label class="small mb-2 opacity-50">Lozinka</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-pixel">Prijavi se</button>

      <div class="text-center mt-4">
        <a href="index.html" class="text-white text-decoration-none small opacity-50">← Nazad na početnu</a>
      </div>
    </form>
  </div>

  <!-- LOADING -->
  <div class="loading" id="loading" style="display:none;">
    <div class="spinner"></div>
    <span class="opacity-50">Prijavljivanje...</span>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const loginBox = document.getElementById('loginBox');
    const loading = document.getElementById('loading');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Fake login (frontend only)
      if(email === "admin@pixelstudio.com" && password === "1234") {
        loginBox.style.display = 'none';
        loading.style.display = 'flex';

        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1500);
      } else {
        alert("Pogrešan email ili lozinka");
      }
    });
  </script>

</body>
</html>
