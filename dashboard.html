<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | PixelStudio</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #00d2ff;
      --dark: #030712;
      --glass: rgba(255,255,255,0.03);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background: var(--dark);
      color: white;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      height: 100vh;
      background: var(--glass);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255,255,255,0.1);
      padding: 25px;
    }

    .sidebar h3 {
      font-weight: 700;
      margin-bottom: 30px;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      opacity: 0.7;
      transition: 0.2s;
    }

    .sidebar a:hover {
      background: rgba(255,255,255,0.05);
      opacity: 1;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 30px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .glass-box {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card-box {
      background: var(--glass);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .status {
      padding: 5px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .in-progress { background: #facc15; color: black; }
    .done { background: #4ade80; color: black; }

  </style>
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>PixelStudio</h3>
    <a href="#">Dashboard</a>
    <a href="#">Projekti</a>
    <a href="#">Poruke</a>
    <a href="#">Fajlovi</a>
    <a href="#">Plaćanja</a>
    <a href="#">Postavke</a>
    <a href="/">Logout</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="header">
      <h2 class="fw-bold">Dashboard</h2>
      <span class="opacity-50">Dobrodošao nazad</span>
    </div>

    <!-- CARDS -->
    <div class="cards">
      <div class="card-box">
        <h6 class="opacity-50">Aktivni projekti</h6>
        <h3>3</h3>
      </div>

      <div class="card-box">
        <h6 class="opacity-50">Završeni</h6>
        <h3>5</h3>
      </div>

      <div class="card-box">
        <h6 class="opacity-50">Poruke</h6>
        <h3>2 nove</h3>
      </div>
    </div>

    <!-- PROJECTS -->
    <div class="glass-box">
      <h5 class="fw-bold">Projekti</h5>

      <table>
        <tr>
          <th>Naziv</th>
          <th>Status</th>
          <th>Rok</th>
        </tr>
        <tr>
          <td>Redizajn sajta</td>
          <td><span class="status in-progress">U izradi</span></td>
          <td>20 Mar 2026</td>
        </tr>
        <tr>
          <td>E-commerce</td>
          <td><span class="status done">Završeno</span></td>
          <td>10 Mar 2026</td>
        </tr>
      </table>

    </div>

  </div>

</body>
</html>
