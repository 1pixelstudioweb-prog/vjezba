<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelStudio | Digitalna Budućnost</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --secondary: #9200ff; --dark-bg: #030712; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--dark-bg); color: #ffffff; overflow-x: hidden; }
        .blob { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(146, 0, 255, 0.15) 0%, transparent 70%); z-index: -1; filter: blur(80px); pointer-events: none; transition: transform 0.2s ease-out; }
        .navbar { backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); padding: 20px 0; z-index: 1050; }
        .navbar-brand { font-weight: 900; font-size: 1.8rem; letter-spacing: -1px; }
        .nav-link:hover { color: var(--primary) !important; }
        .hero { min-height: 100vh; display: flex; align-items: center; position: relative; padding-top: 100px; }
        .hero h1 { font-size: clamp(3rem, 8vw, 6rem); font-weight: 900; line-height: 1.1; background: linear-gradient(to bottom, #fff 40%, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-pixel { background: #fff; color: #000; padding: 16px 40px; border-radius: 100px; font-weight: 700; text-decoration: none; transition: 0.4s; display: inline-block; }
    </style>
</head>
<body>
    <div class="blob" id="blob1" style="top: -10%; left: -10%;"></div>
    <nav class="navbar navbar-expand-lg fixed-top navbar-dark">
        <div class="container">
            <a class="navbar-brand text-white" href="/">PIXEL<span style="color:var(--primary)">.</span>STUDIO</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-4 align-items-center">
                    <li class="nav-item"><a href="/login" class="btn btn-outline-primary rounded-pill px-4">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <section class="hero text-center">
        <div class="container" data-aos="zoom-out">
            <h1 class="mb-4">DIZAJN KOJI <br> PRAVI RAZLIKU.</h1>
            <a href="/login" class="btn-pixel">Započni Projekat</a>
        </div>
    </section>
</body>
</html>
