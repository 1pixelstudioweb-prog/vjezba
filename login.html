<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prijava | PixelStudio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --dark: #030712; --glass: rgba(255, 255, 255, 0.03); }
        body { background: var(--dark); color: white; font-family: 'Outfit', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--glass); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; }
        .form-control { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 15px; padding: 12px; }
        .btn-pixel { background: var(--primary); color: #000; font-weight: 700; border: none; border-radius: 15px; width: 100%; padding: 12px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 class="fw-bold mb-4 text-center">Prijava</h2>
        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="small mb-2 opacity-50">Email</label>
                <input type="text" name="email" class="form-control" placeholder="admin@gmail.com" required>
            </div>
            <div class="mb-4">
                <label class="small mb-2 opacity-50">Lozinka</label>
                <input type="password" name="sifra" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-pixel">Prijavi se</button>
            <div class="text-center mt-4">
                <a href="/" class="text-white text-decoration-none small opacity-50">← Nazad</a>
            </div>
        </form>
    </div>
</body>
</html>
